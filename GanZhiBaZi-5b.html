<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>高精度干支校对</title>
    <style>
        :root { --accent: #c0392b; --bg: #f8f9fa; --border: #e0e0e0; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; justify-content: center; }
        .container { background: #fff; width: 100%; max-width: 550px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); padding: 20px; box-sizing: border-box; }
        
		/* 改为垂直布局 */
		.stepper-row { 
		    display: flex;
		    flex-direction: column;  /* 改为垂直排列 */
		    gap: 12px;               /* 垂直间距加大 */
		    margin-bottom: 25px; 
		}

		.unit-group { 
		    width: 100%;             
		    display: flex;           
		    flex-direction: row;     /* 改为水平排列 */
		    align-items: center;     /* 垂直居中对齐 */
		    gap: 10px;               /* 标签和控件之间的间距 */
		    min-width: 0; 
		}

		.unit-label { 
		    font-size: 20px;         /* 稍微加大字号 */
		    color: #888; 
		    text-align: center;
		    font-weight: bold; 
		    white-space: nowrap;     /* 防止标签换行 */
		    min-width: 80px;         /* 给标签一个最小宽度，保持对齐 */
		}

		/* 步进器样式 */
		.stepper { 
		    display: flex; 
		    align-items: center; 
		    background: #fff; 
		    border: 1px solid var(--border); 
		    border-radius: 6px; 
		    flex: 1;                 /* 步进器占据剩余空间 */
		    height: 40px; 
		    overflow: hidden; 
		}

		.stepper button { 
		    width: 100px;             /* 按钮加宽，便于点击 */
		    height: 100%; 
		    border: none; 
		    background: #f0f0f0; 
		    color: #333; 
		    font-size: 18px; 
		    cursor: pointer; 
		    transition: 0.2s; 
		    -webkit-tap-highlight-color: transparent; 
		}

		.stepper button:active { 
		    background: #ddd; 
		}

		.stepper input { 
		    flex: 1; 
		    width: 100%; 
		    border: none; 
		    text-align: center; 
		    font-size: 16px; 
		    font-weight: 600; 
		    outline: none; 
		    -moz-appearance: textfield; 
		}

		input::-webkit-outer-spin-button, 
		input::-webkit-inner-spin-button { 
		    -webkit-appearance: none; 
		} 

       /* 干支盘样式 */
        .gz-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 10px; }
        .pillar { background: #fffcf5; border: 1px solid #f2e6d5; border-radius: 10px; padding: 12px 0; text-align: center; }
        .p-head { font-size: 11px; color: #998c7e; margin-bottom: 4px; }
        .p-body { font-size: 1.5rem; font-weight: 800; color: var(--accent); }
        .animal-tag { font-size: 12px; color: #666; margin-top: 5px; }

        .footer { text-align: center; margin-top: 20px; font-size: 12px; color: #bbb; }
    </style>
</head>
<body>

<div class="container">
    <div class="stepper-row">
        <div class="unit-group">
            <span class="unit-label">年</span>
            <div class="stepper">
                <button onclick="adj('y',-1)">-</button>
                <input type="number" id="y" value="2026" oninput="calc()">
                <button onclick="adj('y',1)">+</button>
            </div>
        </div>
        <div class="unit-group">
            <span class="unit-label">月</span>
            <div class="stepper">
                <button onclick="adj('m',-1)">-</button>
                <input type="number" id="m" value="3" oninput="calc()">
                <button onclick="adj('m',1)">+</button>
            </div>
        </div>
        <div class="unit-group">
            <span class="unit-label">日</span>
            <div class="stepper">
                <button onclick="adj('d',-1)">-</button>
                <input type="number" id="d" value="11" oninput="calc()">
                <button onclick="adj('d',1)">+</button>
            </div>
        </div>
        <div class="unit-group">
            <span class="unit-label">时</span>
            <div class="stepper">
                <button onclick="adj('h',-1)">-</button>
                <input type="number" id="h" value="14" oninput="calc()">
                <button onclick="adj('h',1)">+</button>
            </div>
        </div>
    </div>

    <div class="gz-grid">
        <div class="pillar"><div class="p-head">年柱</div><div id="outY" class="p-body">--</div><div id="outA" class="animal-tag"></div></div>
        <div class="pillar"><div class="p-head">月柱</div><div id="outM" class="p-body">--</div></div>
        <div class="pillar"><div class="p-head">日柱</div><div id="outD" class="p-body">--</div></div>
        <div class="pillar"><div class="p-head">时柱</div><div id="outH" class="p-body">--</div></div>
    </div>

    <div class="footer" id="fullStr"></div>
</div>

<script>
    const Gan = "甲乙丙丁戊己庚辛壬癸", Zhi = "子丑寅卯辰巳午未申酉戌亥", Animals = "鼠牛虎兔龙蛇马羊猴鸡狗猪";

    // 模拟 getTerm 函数（为了运行，这里提供一个基础近似算法，你可以替换为你真实的 getTerm）
    function getTerm(y, n) {
        const off = [0, 21208, 42467, 63836, 85337, 107014, 128867, 150921, 173149, 195551, 218072, 240693, 263343, 285989, 308563, 331033, 353350, 375494, 397447, 419210, 440795, 462224, 483532, 504758];
        const d = new Date((31556925974.7 * (y - 1900) + off[n] * 60000) + Date.UTC(1900, 0, 6, 2, 5));
        return d.getUTCDate();
    }

    // 你的核心 getFullGZ 函数
    function getFullGZ(date) {
        const y = date.getFullYear(), m = date.getMonth(), d = date.getDate(), h = date.getHours();
        let gzYear = y;
        let lcDay = getTerm(y, 2); 
        if (m < 1 || (m === 1 && d < lcDay)) gzYear = y - 1;
        let yIdx = (gzYear - 3) % 60;
        if (yIdx <= 0) yIdx += 60;
        let gzY = Gan[(yIdx - 1) % 10] + Zhi[(yIdx - 1) % 12];
        let animal = Animals[(yIdx - 1) % 12];

        let mIdx = (y - 1900) * 12 + m + 13;
        let t1d = getTerm(y, m * 2); 
        if (d >= t1d) mIdx++;
        let gzM = Gan[(mIdx - 1) % 10] + Zhi[(mIdx - 1) % 12];

        const baseDate = Date.UTC(1900, 0, 31);
        const targetDate = Date.UTC(y, m, d);
        const offset = Math.round((targetDate - baseDate) / 86400000);
        let dIdx = (offset + 40) % 60;
        if (dIdx < 0) dIdx += 60;
        let gzD = Gan[dIdx % 10] + Zhi[dIdx % 12];

        let zhiHIdx = Math.floor((h + 1) / 2) % 12;
        let dayGanIdx = dIdx % 10; 
        let startHourGanIdx = (dayGanIdx % 5) * 2; 
        let gzH = Gan[(startHourGanIdx + zhiHIdx) % 10] + Zhi[zhiHIdx];

        return { gzY, gzM, gzD, gzH, animal };
    }

	function adj(id, delta) {
	    const el = document.getElementById(id);
	    let val = parseInt(el.value) || 0;
	    val += delta;

	    if (id === 'm') { // 月份 1-12 循环
	        if (val > 12) val = 1;
	        if (val < 1) val = 12;
	    } else if (id === 'd') { // 日期 1-31 循环
	        if (val > 31) val = 1;
	        if (val < 1) val = 31;
	    } else if (id === 'h') { // 小时 0-23 循环
	        if (val > 23) val = 0;
	        if (val < 0) val = 23;
	    }
	    
	    el.value = val;
	    calc(); // 触发计算
	}

	function calc() {
		let y = parseInt(document.getElementById('y').value) || 2026;
	    let m = parseInt(document.getElementById('m').value) || 1;
	    let d = parseInt(document.getElementById('d').value) || 1;
	    let h = parseInt(document.getElementById('h').value) || 0;

	    // 强制约束手动输入的范围
	    m = Math.max(1, Math.min(12, m));
	    d = Math.max(1, Math.min(31, d));
	    h = Math.max(0, Math.min(23, h));

	    // 将修正后的值写回输入框（可选，建议在 blur 时执行，这里为了严谨即时写回）
	    document.getElementById('m').value = m;
	    document.getElementById('d').value = d;
	    document.getElementById('h').value = h;

		// 利用 Date 对象的溢出特性：new Date(2026, 1, 31) 会自动变成 2026年3月3日
		const date = new Date(y, m - 1, d, h);
		// 如果你希望用户界面上的数字也跟着“自动修正”为合法日期：
	    const correctedM = date.getMonth() + 1;
	    const correctedD = date.getDate();
	    document.getElementById('m').value = correctedM;
    	document.getElementById('d').value = correctedD;
	    const res = getFullGZ(date);    
    
		document.getElementById('outY').innerText = res.gzY;
		document.getElementById('outM').innerText = res.gzM;
		document.getElementById('outD').innerText = res.gzD;
		document.getElementById('outH').innerText = res.gzH;
		document.getElementById('outA').innerText = res.animal;
		document.getElementById('fullStr').innerText = date.toLocaleString('zh-CN', {hour12: false});
	    }

    window.onload = () => {
        const n = new Date();
        document.getElementById('y').value = n.getFullYear();
        document.getElementById('m').value = n.getMonth() + 1;
        document.getElementById('d').value = n.getDate();
        document.getElementById('h').value = n.getHours();
        calc();
    };
</script>
</body>
</html>
