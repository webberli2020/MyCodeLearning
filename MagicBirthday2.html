<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公农历生日重合查询工具</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h2 { color: #333; text-align: center; margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #666; font-size: 14px; }
        input[type="date"] { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; background: #4CAF50; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; transition: background 0.3s; }
        button:hover { background: #45a049; }
        #result { margin-top: 20px; border-top: 1px solid #eee; padding-top: 15px; }
        .match-item { background: #e8f5e9; margin: 5px 0; padding: 10px; border-left: 4px solid #4CAF50; border-radius: 4px; }
        .info-text { font-size: 13px; color: #888; margin-bottom: 10px; }
        .highlight { color: #2e7d32; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>🎂 生日重合查询</h2>
    <p class="info-text">输入您的出生日期，系统将扫描未来 100 年内公历与农历生日完全重合的年份。</p>
    
    <div class="input-group">
        <label>选择出生日期 (公历)</label>
        <input type="date" id="birthDate" value="1973-06-08">
    </div>
    
    <button onclick="calculateMatches()">开始扫描重合年份</button>

    <div id="result">
        </div>
</div>

<script>
    const lunarInfo = [0x04bd8,0x04ae0,0x0a570,0x054d5,0x0d260,0x0d950,0x16554,0x056a0,0x09ad0,0x055d2,0x04ae0,0x0a5b6,0x0a4d0,0x0d250,0x1d255,0x0b540,0x0d6a0,0x0ada2,0x095b0,0x14977,0x04970,0x0a4b0,0x0b4b5,0x06a50,0x06d40,0x1ab54,0x02b60,0x09570,0x052f2,0x04970,0x06566,0x0d4a0,0x0ea50,0x06e95,0x05ad0,0x02b60,0x186e3,0x092e0,0x1c8d7,0x0c950,0x0d4a0,0x1d8a6,0x0b550,0x056a0,0x1a5b4,0x025d0,0x092d0,0x0d2b2,0x0a950,0x0b557,0x06ca0,0x0b550,0x15355,0x04da0,0x0a5b0,0x14573,0x052b0,0x0a9a8,0x0e950,0x06aa0,0x0aea6,0x0ab50,0x04b60,0x0aae4,0x0a570,0x05260,0x0f263,0x0d950,0x05b57,0x056a0,0x096d0,0x04dd5,0x04ad0,0x0a4d0,0x0d4d4,0x0d250,0x0d558,0x0b540,0x0b6a0,0x195a6,0x095b0,0x049b0,0x0a974,0x0a4b0,0x0b27a,0x06a50,0x06d40,0x0af46,0x0ab60,0x09570,0x04af5,0x04970,0x064b0,0x074a3,0x0ea50,0x06b58,0x055c0,0x0ab60,0x096d5,0x092e0,0x0c960,0x0d954,0x0d4a0,0x0da50,0x07552,0x056a0,0x0abb7,0x025d0,0x092d0,0x0cab5,0x0a950,0x0b4a0,0x0baa4,0x0ad50,0x055d9,0x04ba0,0x0a5b0,0x15176,0x052b0,0x0a930,0x07954,0x06aa0,0x0ad50,0x05b52,0x04b60,0x0a6e6,0x0a4e0,0x0d260,0x0ea65,0x0d530,0x05aa0,0x076a3,0x096d0,0x04bd7,0x04ad0,0x0a4d0,0x1d0b6,0x0d250,0x0d520,0x0dd45,0x0b5a0,0x056d0,0x055b2,0x049b0,0x0a577,0x0a4b0,0x0aa50,0x1b255,0x06d20,0x0ada0,0x14b63,0x09370,0x049f8, 0x04970, 0x064b0, 0x168a6, 0x0ea50, 0x06b20, 0x1a6c4, 0x0aae0,0x092e0, 0x0d2e3, 0x0c960, 0x0d557, 0x0d4a0, 0x0da50, 0x05d55, 0x056a0, 0x0a6d0, 0x055d4,0x052d0,0x0a9b8,0x0a950, 0x0b4a0, 0x0b6a6, 0x0ad50, 0x055a0, 0x0aba4, 0x0a5b0, 0x052b0,0x0b273, 0x06930, 0x07337, 0x06aa0, 0x0ad50, 0x14b55, 0x04b60, 0x0a570, 0x054e4, 0x0d160,0x0e968, 0x0d520,0x0daa0, 0x16aa6, 0x056d0, 0x04ae0, 0x0a9d4, 0x0a4d0, 0x0d150, 0x0f252,0x0d520];
		

    // 基础辅助常量
    const nStr1 = ['日','一','二','三','四','五','六','七','八','九','十'];
    const nStr2 = ['初','十','廿','卅','□'];
    const nStr3 = ['正','二','三','四','五','六','七','八','九','十','十一','腊'];

    // --- 核心历法算法 ---
    function lYearDays(y) {
        let i, sum = 348;
        for (i = 0x8000; i > 0x8; i >>= 1) sum += (lunarInfo[y - 1900] & i) ? 1 : 0;
        return (sum + leapDays(y));
    }
    function leapDays(y) {
        if (leapMonth(y)) return ((lunarInfo[y - 1900] & 0x10000) ? 30 : 29);
        return 0;
    }
    function leapMonth(y) { return lunarInfo[y - 1900] & 0xf; }
    function monthDays(y, m) { return ((lunarInfo[y - 1900] & (0x10000 >> m)) ? 30 : 29); }

    function getLunar(y, m, d) {
        let i, leap = 0, temp = 0;
        let offset = (Date.UTC(y, m, d) - Date.UTC(1900, 0, 31)) / 86400000;
        for (i = 1900; i < 2101 && offset > 0; i++) {
            temp = lYearDays(i);
            offset -= temp;
        }
        if (offset < 0) { offset += temp; i--; }
        let year = i;
        leap = leapMonth(i);
        let isLeap = false;
        for (i = 1; i < 13 && offset > 0; i++) {
            if (leap > 0 && i === (leap + 1) && !isLeap) { --i; isLeap = true; temp = leapDays(year); }
            else { temp = monthDays(year, i); }
            if (isLeap && i === (leap + 1)) isLeap = false;
            offset -= temp;
        }
        if (offset === 0 && leap > 0 && i === leap + 1) {
            if (isLeap) isLeap = false; else { isLeap = true; --i; }
        }
        if (offset < 0) { offset += temp; --i; }
        return { month: i, day: offset + 1, isLeap: isLeap };
    }

    function getDoubleBirthdayYears(baseY, baseM, baseD) {
        // 1. 获取选中当天的农历信息 (假设你的 getLunar 函数返回 {month, day, isLeap})
        let baseLunar = getLunar(baseY, baseM, baseD);
        let targetMonth = baseLunar.month;
        let targetDay = baseLunar.day;
        let targetLeap = baseLunar.isLeap;

        let matchYears = [];

        // 2. 在年范围内扫描 (1901-2099)
        for (let y = baseY; y <= 2099; y++) {
            // 扫描该年公历生日那天的农历情况
            // 注意：baseM 是 0-11
            let checkLunar = getLunar(y, baseM, baseD);

            // 3. 判断是否完全重合
            if (checkLunar.month === targetMonth && 
                checkLunar.day === targetDay && 
                checkLunar.isLeap === targetLeap) {
                
                // 如果是当前选中的年份，可以加个加粗标记
                if (y === baseY) {
                    matchYears.push(`<strong>${y}</strong>`);
                } else {
                    matchYears.push(y);
                }
            }
        }
        return matchYears;
    }

    // --- 业务逻辑 ---
    function calculateMatches() {
        const dateInput = document.getElementById('birthDate').value;
        if (!dateInput) return alert("请选择日期");

        const parts = dateInput.split('-');
        const bY = parseInt(parts[0]);
        const bM = parseInt(parts[1]) - 1; // JS 月份 0-11
        const bD = parseInt(parts[2]);

        // 1. 获取初始农历生日
        const baseLunar = getLunar(bY, bM, bD);
        const resultDiv = document.getElementById('result');
        
        var lMonthName = (baseLunar.isLeap ? "闰" : "") + nStr3[baseLunar.month - 1] + "月";
		var lDayName = (baseLunar.day == 10 ? "初十" : baseLunar.day == 20 ? "二十" : baseLunar.day == 30 ? "三十" : nStr2[Math.floor(baseLunar.day / 10)] + nStr1[baseLunar.day % 10]);
		
        //出生农历：<span class="highlight">${baseLunar.isLeap ? '闰' : ''}${nStr3[baseLunar.month-1]}月${baseLunar.day < 11 ? '初' : ''}${baseLunar.day % 10}</span>
        let html = `<div class="info-text">
            出生农历：<span class="highlight">${lMonthName}${lDayName}</span>
        </div>`;

        let matches = [];
        // 2. 扫描未来 100 年 (到 2100 年为止)
        matches=getDoubleBirthdayYears(bY, bM, bD);

        // 3. 渲染结果
        if (matches.length > 0) {
            matches.forEach(m => {
                html += `<div class="match-item">
                    <b>${m}年重合</b>
                </div>`;
            });
        } else {
            html += `<p style="color:red">抱歉，在现有数据范围内未找到完全重合的年份。</p>`;
        }

        resultDiv.innerHTML = html;
    }
</script>

</body>
</html>
